services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    volumes:
      - ./backend:/app
      - ./backend/data:/app/data
    ports:
      - 8000:8000
    env_file:
      - ./backend/.env
    container_name: api

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - 5173:5173
    depends_on:
      - api
    container_name: frontend

